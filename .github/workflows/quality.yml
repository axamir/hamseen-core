name: quality
on:
  push:
  pull_request:
permissions: {contents: read}
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: {version: 11.9.0}
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: pnpm}
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Verify bilingual filename parity
        run: diff -u <(find docs/en -maxdepth 1 -name '*.md' -printf '%f\n' | sort) <(find docs/fa -maxdepth 1 -name '*.md' -printf '%f\n' | sort)
